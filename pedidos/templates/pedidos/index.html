{% load static %}
<!DOCTYPE html>
<html lang="es">
    <head>
        <title>Bienvenido - Brother's Burger</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta2/css/all.min.css" integrity="sha512-YWzhKL2whUzgiheMoBFwW8CKV4qpHQAEuvilg9FAn5VJUDwKZZxkJNuGM4XkWuk94WCrrwslk8yWNGmY1EduTA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
        <script src="js/menu.js"></script>
        <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    </head>
    <body>
        <header>
            <nav class="d-flex align-items-center">
                <ul class='nav-bar'>
                    <li class='logo'><a href=''><img src="{% static 'img/logo2.jpeg' %}" alt="Logo"/></a></li>
                    <input type='checkbox' id='check' />
                    <span class="menu">
                        <li><a href="">Home</a></li>
                        <li><a href="{% url 'pedidos:menu_productos' %}">Menú</a></li>
                        <li><a href="opcion/contacto.html">Contacto</a></li>
                        <li><a href="opcion/donde.html">¿Dónde estamos?</a></li>
                        <!-- <li><a href="opcion/nosotros.html">Sobre nosotros</a></li>-->

                        <label for="check" class="close-menu"><i class="fas fa-times"></i></label>
                    </span>
                    <label for="check" class="open-menu"><i class="fas fa-bars"></i></label>
                </ul>
                
            </nav>
        </header> 
        <main>
            <div class="promo-container">
                <!--<h2>No te pierdas nuestras promociones</h2>-->
                <article class="promo">
                    <a href="#">
                        <img src="{% static 'img/promo/promo-smash.jpeg' %}" alt="Promo hamburguesa Smashican">
                    </a>
                </article>
                <article class="promo">
                    <a href="">
                        <img src="{% static 'img/promo/promo-doble.jpeg' %}" alt="Promo 2x1 de hamburguesa con doble carne">
                    </a>
                </article>
                <article class="promo">
                    <a href="">
                        <img src="{% static 'img/promo/ham-philly.jpeg' %}" alt="Relanzamiento de la Philly">
                    </a>
                </article>
                
            </div>
            <a href="{% url 'administrador:menu' %}" class="btn btn-secondary">Volver</a>
        </main>
        <footer>
            <p>2024 Brother's Burger</p>
        </footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
