{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productos - Brother's Burger</title>
  <!-- Fuente-->
   <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Estilos -->
  <link rel="stylesheet" href="{% static 'css/menu_productos.css' %}">
</head>
<body>
  <header class="header bg-dark">
    <h1>BROTHER'S BURGER</h1>
    <nav class="nav justify-content-center">
      <a href="{% url 'pedidos:index' %}">Inicio</a>
      <a href="{% url 'pedidos:menu_productos' %}">Productos</a>
      <a href="contacto.html">Contacto</a>
    </nav>
    <div class="contenedor">
      <input type="text" id="buscar" class="form-control w-50" placeholder="Buscar productos..." />
      <button id="carrito-btn" class="btn btn-warning ms-3">
        🛒 (<span id="carrito-contador">0</span>)
      </button>
    </div>
  </header>

  <!-- Menú de categorías -->
  <div class="container my-4 bg-dark w-50 p-2 rounded">
    <ul class="nav nav-pills justify-content-center" id="menu-categorias">
      <li class="nav-item">
        <button class="nav-link active bg-dark"
            hx-get="{% url 'pedidos:lista_productos' %}"
            hx-target="#productos-lista"
            hx-swap="innerHTML">
          Todo
        </button>
      </li>
      {% for categoria in categorias %}
        <li class="nav-item">
          <button class="nav-link bg-dark text-white"
            hx-get="{% url 'pedidos:lista_productos' %}?categoria={{ categoria.nombre_categ|urlencode }}"
            hx-target="#productos-lista"
            hx-swap="innerHTML">
            {{ categoria.nombre_categ }}
          </button>
        </li>
      {% endfor %}
    </ul>
  </div>

  <!-- Productos -->
  <section id="productos" class="container">
    <h2 class="text-center mb-4">Nuestros Productos</h2>
    <!-- Contenedor para htmx -->
    <div 
        hx-get="{% url 'pedidos:lista_productos' %}"
        hx-trigger="load"
        hx-target="#productos-lista"
        hx-swap="innerHTML">
        <!-- Se insertan los productos dinamicamente -->
        <div  id="productos-lista" class="productos-grid">
          
        </div>
    </div>
  </section>

  <footer class="footer">
    <p>Contacto: +595 971 123 456</p>
    <p>© 2024 The Burger. Todos los derechos reservados.</p>
  </footer>
  <script src="https://unpkg.com/htmx.org"></script>
</body>
</html>
