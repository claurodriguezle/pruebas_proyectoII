{% extends "base_empleado.html" %}
{% load static %}

{% block title %}
    Categorías
{% endblock %}

{% block body %}
<div class="container">
    <div class="header mt-4 mb-3">
        <h2>Categorías</h2>
        
        <button class="btn btn-primary" 
            hx-get="{% url 'administrador:crear_categorias' %}"
            hx-target="#modalCategoriaBody"
            hx-swap="innerHTML"
            data-bs-toggle="modal" data-bs-target="#modalCategoria">
            + Categoría
        </button>
        
    </div>

    <!-- Toggle para mostrar inactivas - CORREGIDO -->
    <div class="form-check form-switch mb-3">
        <input class="form-check-input" type="checkbox" id="mostrarInactivasCheck"
               name="mostrar_inactivas"
               value="on"
               hx-get="{% url 'administrador:listar_categorias_partial' %}"
               hx-target="#tabla-container"
               hx-swap="innerHTML"
               hx-trigger="change">
        <label class="form-check-label" for="mostrarInactivasCheck">
            Mostrar categorías inactivas
        </label>
    </div>

    <div class="table-responsive" id="tabla-container"
    hx-get="{% url 'administrador:listar_categorias_partial' %}"
    hx-trigger="load"
    hx-swap="innerHTML"
    >
        <!-- Aquí se mostrarán las categorías -->
    </div>
    <a href="{% url 'administrador:productos' %}" class="btn btn-secondary">Volver</a>
</div>

<!-- Modal para añadir/editar categoría -->
<div class="modal fade" id="modalCategoria" tabindex="-1" aria-labelledby="categoriaModalLabel" aria-hidden="true"
hx-on:modalCategoriaCerrado="bootstrap.Modal.getInstance(document.getElementById('modalCategoria')).hide()">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-body" id="modalCategoriaBody" style="min-height: 240px;">
                <!-- Aquí se cargará el formulario dinámicamente -->
            </div>
        </div>
    </div>
</div>
    
{% endblock %}
