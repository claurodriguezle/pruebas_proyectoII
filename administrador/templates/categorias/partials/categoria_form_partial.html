<form
    method="POST"
    hx-post="{% if categoria %}{% url 'administrador:editar_categoria' categoria.id %}{% else %}{% url 'administrador:crear_categorias' %}{% endif %}"
    hx-target="#tabla-container"
    hx-swap="innerHTML"
    class="form"
    >
    {% csrf_token %}
    <div class="mb-3">
        <label for="id_nombre_categ" class="form-label">Nombre</label>
        {{ form.nombre_categ }}
        {% if form.nombre_categ.errors %}
            <div class="text-danger">{{ form.nombre_categ.errors }}</div>
        {% endif %}
    </div>

    <div class="mb-3">
        <label for="id_tipo" class="form-label">Tipo</label>
        {{ form.tipo }}
        {% if form.tipo.errors %}
            <div class="text-danger">{{ form.tipo.errors }}</div>
        {% endif %}
    </div>

    <div class="d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cancelar</button>
        <button type="submit" class="btn btn-primary">
            {% if categoria %}Actualizar{% else %}Guardar{% endif %}
        </button>
    </div>
</form>
