<tr id="categoria-{{ categoria.id }}" {% if not categoria.activo %}class="table-secondary text-muted" style="opacity: 0.7;"{% endif %}>
    <td>{{ categoria.id }}</td>
    <td>{{ categoria.nombre_categ }}</td>
    <td>{{ categoria.get_tipo_display }}</td>
    <td>
        <div class="d-flex gap-1">
            <button class="btn btn-sm btn-outline-primary"
                hx-get="{% url 'administrador:editar_categoria' categoria.id %}"
                hx-target="#modalCategoriaBody"
                hx-swap="innerHTML"
                data-bs-toggle="modal"
                data-bs-target="#modalCategoria">
                <i class="bi bi-pencil-fill"></i>
            </button>

            {% if categoria.activo %}
                <button class="btn btn-sm btn-outline-warning"
                    hx-post="{% url 'administrador:toggle_categoria' categoria.id %}"
                    hx-target="#categoria-{{ categoria.id }}"
                    hx-swap="outerHTML"
                    hx-vals='{"mostrar_inactivas": "{{ mostrar_inactivas|default:'false' }}"}'
                    hx-confirm="¿Desactivar esta categoría?">
                    <i class="bi bi-toggle-off"></i> Desactivar
                </button>
            {% else %}
                <button class="btn btn-sm btn-outline-success"
                    hx-post="{% url 'administrador:toggle_categoria' categoria.id %}"
                    hx-target="#categoria-{{ categoria.id }}"
                    hx-swap="outerHTML"
                    hx-vals='{"mostrar_inactivas": "{{ mostrar_inactivas|default:'false' }}"}'>
                    <i class="bi bi-toggle-on"></i> Activar
                </button>
            {% endif %}
        </div>
    </td>
</tr>
