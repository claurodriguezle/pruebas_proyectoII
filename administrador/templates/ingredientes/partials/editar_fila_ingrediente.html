<tr id="ingrediente-{{ ingrediente.id }}">
    <td>{{ ingrediente.item.nombre }}</td>
    <td>
        <form
            hx-post="{% url 'administrador:actualizar_ingrediente' ingrediente.id %}"
            hx-target="#ingrediente-{{ ingrediente.id }}"
            hx-swap="outerHTML"
        >
            {% csrf_token %}
            <div class="d-flex align-items-center gap-2 flex-wrap">
                <input 
                    type="number"
                    name="cantidad"
                    value="{{ ingrediente.cantidad }}"
                    class="form-control form-control-sm"
                    required min="1"
                    style="width: 100px;">

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="puede_eliminarse" id="eliminarse-{{ ingrediente.id }}"
                        {% if ingrediente.puede_eliminarse %}checked{% endif %}>
                    <label class="form-check-label" for="eliminarse-{{ ingrediente.id }}">Puede eliminarse</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="puede_ser_extra" id="extra-{{ ingrediente.id }}"
                        {% if ingrediente.puede_ser_extra %}checked{% endif %}>
                    <label class="form-check-label" for="extra-{{ ingrediente.id }}">Puede ser extra</label>
                </div>

                <button type="submit" class="btn btn-sm btn-success">Guardar</button>
                <button 
                    type="button"
                    class="btn btn-sm btn-secondary"
                    hx-get="{% url 'administrador:ver_fila_ingrediente' ingrediente.id %}"
                    hx-target="#ingrediente-{{ ingrediente.id }}"
                    hx-swap="outerHTML">
                    Cancelar
                </button>
            </div>
        </form>
    </td>
    <td></td>
    <td></td>
    <td></td>
</tr>
