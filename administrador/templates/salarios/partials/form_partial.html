{% load humanize %}

{% if modo == 'crear' %}
    <div class="modal-header">
        <h5 class="modal-title">
            <i class="bi bi-plus-circle-fill me-2 text-success"></i>Nuevo Salario
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    <form method="post"
          hx-post="{% url 'administrador:crear_salario_htmx' %}"
          hx-target="#salarioTableBody"
          hx-swap="beforeend"
          hx-on::after-request="if(event.detail.successful) { bootstrap.Modal.getInstance(document.getElementById('salarioModal')).hide(); }">
        {% csrf_token %}
        <div class="modal-body">
            <label class="form-label fw-semibold">Monto (Gs.)</label>
            <div class="input-group">
                <span class="input-group-text">Gs.</span>
                <input type="number"
                       name="monto"
                       class="form-control"
                       placeholder="Ej: 2500000"
                       min="1"
                       step="1"
                       required>
            </div>
            <div class="form-text text-muted mt-1">
                Ingresá el monto mensual en guaraníes.
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">
                Cancelar
            </button>
            <button type="submit" class="btn btn-success btn-sm">
                <i class="bi bi-floppy-fill me-1"></i>Crear
            </button>
        </div>
    </form>

{% else %}
    <!-- Modo edición -->
    <div class="modal-header">
        <h5 class="modal-title">
            <i class="bi bi-pencil-fill me-2 text-primary"></i>Editar Salario
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    <form method="post"
          hx-post="{% url 'administrador:editar_salario_htmx' salario.id %}"
          hx-target="#salario-{{ salario.id }}"
          hx-swap="outerHTML"
          hx-on::after-request="if(event.detail.successful) { bootstrap.Modal.getInstance(document.getElementById('salarioModal')).hide(); }">
        {% csrf_token %}
        <div class="modal-body">
            <label class="form-label fw-semibold">Monto (Gs.)</label>
            <div class="input-group">
                <span class="input-group-text">Gs.</span>
                <input type="number"
                       name="monto"
                       class="form-control"
                       placeholder="Ej: 2500000"
                       min="1"
                       step="1"
                       value="{{ salario.monto|floatformat:0 }}"
                       required>
            </div>
            <div class="form-text text-muted mt-1">
                Ingresá el monto mensual en guaraníes.
            </div>
            <div class="alert alert-info py-2 mt-3 small">
                <i class="bi bi-info-circle-fill me-1"></i>
                Este cambio afectará a todos los empleados que tengan este salario asignado.
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">
                Cancelar
            </button>
            <button type="submit" class="btn btn-primary btn-sm">
                <i class="bi bi-floppy-fill me-1"></i>Guardar
            </button>
        </div>
    </form>
{% endif %}
