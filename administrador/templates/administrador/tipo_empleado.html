{% extends "base_empleado.html" %}
{% load static %}

{% block title %}Tipos de Empleado{% endblock %}

{% block body %}
<div class="container-fluid">
    <div class="header">
        <h2>Tipos de Empleado</h2>
        <hr>
    </div>

    <div class="header d-flex gap-2 mb-3">
        <button class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#tipoModal"
                hx-get="{% url 'administrador:tipo_empleado_crear_partial' %}"
                hx-target="#tipoFormBody"
                hx-swap="innerHTML">
            + Nuevo
        </button>
        <a class="btn btn-secondary" href="{% url 'administrador:salarios' %}" role="button">Salarios</a>
    </div>

    <div class="table-contenedor w-100">
        <table class="table table-striped table-hover w-100">
            <thead>
                <tr>
                    <th>N°</th>
                    <th>Nombre</th>
                    <th>Empleados</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tipoTableBody"
                   hx-get="{% url 'administrador:tipo_empleado_rows' %}"
                   hx-trigger="load"
                   hx-swap="innerHTML">
            </tbody>
        </table>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="tipoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Tipo de Empleado</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="tipoFormBody">
            </div>
        </div>
    </div>
</div>
{% endblock %}
