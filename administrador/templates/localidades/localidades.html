{% extends "base_empleado.html" %}
{% load static %}

{% block title %}Localidades{% endblock %}

{% block body %}
<div class="container-fluid">

    <div class="header">
        <h2>Localidades</h2>
        <hr>
    </div>

    <!-- Tabs: Ciudades / Barrios -->
    <ul class="nav nav-tabs mb-3" id="localidadesTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="ciudades-tab"
                data-bs-toggle="tab" data-bs-target="#tab-ciudades"
                type="button" role="tab">
                <i class="bi bi-geo-alt"></i> Ciudades
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="barrios-tab"
                data-bs-toggle="tab" data-bs-target="#tab-barrios"
                type="button" role="tab">
                <i class="bi bi-map"></i> Barrios
            </button>
        </li>
    </ul>

    <div class="tab-content">

        <!-- ══════════════ TAB CIUDADES ══════════════ -->
        <div class="tab-pane fade show active" id="tab-ciudades" role="tabpanel">

            <div class="d-flex gap-2 mb-3">
                <button class="btn btn-primary"
                    data-bs-toggle="modal" data-bs-target="#ciudadModal"
                    hx-get="{% url 'administrador:ciudades_crear_partial' %}"
                    hx-target="#ciudadFormBody"
                    hx-swap="innerHTML">
                    + Nueva Ciudad
                </button>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nombre</th>
                            <th>Barrios</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="ciudadTableBody"
                        hx-get="{% url 'administrador:ciudades_listar_partial' %}"
                        hx-trigger="load, ciudadActualizado from:body"
                        hx-swap="innerHTML">
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ══════════════ TAB BARRIOS ══════════════ -->
        <div class="tab-pane fade" id="tab-barrios" role="tabpanel">

            <div class="d-flex gap-2 mb-3">
                <button class="btn btn-primary"
                    data-bs-toggle="modal" data-bs-target="#barrioModal"
                    hx-get="{% url 'administrador:barrios_crear_partial' %}"
                    hx-target="#barrioFormBody"
                    hx-swap="innerHTML">
                    + Nuevo Barrio
                </button>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nombre</th>
                            <th>Ciudad</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="barrioTableBody"
                        hx-get="{% url 'administrador:barrios_listar_partial' %}"
                        hx-trigger="load, barrioActualizado from:body"
                        hx-swap="innerHTML">
                    </tbody>
                </table>
            </div>
        </div>

    </div><!-- /tab-content -->
</div>

<!-- ══ Modal Ciudad ══ -->
<div class="modal fade" id="ciudadModal" tabindex="-1" aria-labelledby="ciudadModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="ciudadModalLabel">Ciudad</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="ciudadFormBody">
                <!-- cargado por HTMX -->
            </div>
        </div>
    </div>
</div>

<!-- ══ Modal Barrio ══ -->
<div class="modal fade" id="barrioModal" tabindex="-1" aria-labelledby="barrioModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="barrioModalLabel">Barrio</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="barrioFormBody">
                <!-- cargado por HTMX -->
            </div>
        </div>
    </div>
</div>

<script>
    // Cierra el modal de ciudad tras guardar exitosamente
    document.body.addEventListener('htmx:afterOnLoad', function(evt) {
        const trigger = evt.detail.xhr && evt.detail.xhr.getResponseHeader('HX-Trigger');
        if (trigger === 'ciudadGuardado') {
            bootstrap.Modal.getInstance(document.getElementById('ciudadModal'))?.hide();
        }
        if (trigger === 'barrioGuardado') {
            bootstrap.Modal.getInstance(document.getElementById('barrioModal'))?.hide();
        }
    });
</script>

{% endblock %}
