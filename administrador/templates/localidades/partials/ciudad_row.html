<tr id="ciudad-{{ ciudad.id }}">
    <td>{{ ciudad.id }}</td>
    <td>
        {{ ciudad.nombre }}
        {% if not ciudad.activo %}
            <span class="badge bg-secondary ms-2">Inactiva</span>
        {% endif %}
    </td>
    <td>{{ ciudad.barrio_set.count }}</td>
    <td>
        <!-- Editar -->
        <button class="btn btn-outline-primary btn-sm" title="Editar"
            data-bs-toggle="modal"
            data-bs-target="#ciudadModal"
            hx-get="{% url 'administrador:ciudades_editar_partial' ciudad.id %}"
            hx-target="#ciudadFormBody"
            hx-swap="innerHTML">
            <i class="bi bi-pencil-square"></i>
        </button>

        <!-- Toggle Habilitar/Deshabilitar (reemplaza al eliminar) -->
        <button class="btn {% if ciudad.activo %}btn-outline-warning{% else %}btn-outline-success{% endif %} btn-sm"
            title="{% if ciudad.activo %}Deshabilitar{% else %}Habilitar{% endif %}"
            hx-post="{% url 'administrador:ciudades_toggle_htmx' ciudad.id %}"
            hx-target="#ciudad-{{ ciudad.id }}"
            hx-swap="outerHTML">
            <i class="bi {% if ciudad.activo %}bi-toggle-on{% else %}bi-toggle-off{% endif %}"></i>
        </button>
    </td>
</tr>
