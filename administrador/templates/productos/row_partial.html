{% load humanize custom_filters %}
<tr id="producto-{{ producto.id }}" {% if producto.estado == 'I' %}class="table-secondary text-muted" style="opacity: 0.7;"{% endif %}>
    <td>
        {% if producto.imagen %}
            <img src="{{ producto.imagen.url }}" alt="{{ producto.nombre }}" width="50" height="50">
        {% else %}
            <span class="text-muted">Sin imagen</span>
        {% endif %}
    </td>
    <td>{{ producto.codigo }}</td>
    <td>{{ producto.nombre }}</td>
    <td>{{ producto.precio|punto_miles }} ₲</td>
    <td>{{ producto.categoria }}</td>
    <td class="small">{{ producto.descripcion }}</td>
    <td>
        <div class="d-flex gap-1">
            <button class="btn btn-outline-primary btn-sm" title="Editar"
                data-bs-toggle="modal"
                data-bs-target="#productModal"
                hx-get="{% url 'administrador:editar_partial' producto.id %}"
                hx-target="#productFormBody"
                hx-swap="innerHTML">
                <i class="bi bi-pencil-square"></i>
            </button>

            {% if producto.estado == 'A' %}
                <button class="btn btn-outline-warning btn-sm" title="Desactivar"
                    hx-post="{% url 'administrador:desactivar_producto' producto.id %}"
                    hx-target="#producto-{{ producto.id }}"
                    hx-swap="outerHTML"
                    hx-confirm="¿Desactivar este producto? Dejará de mostrarse en la lista principal.">
                    <i class="bi bi-toggle-off"></i> Desactivar
                </button>
            {% else %}
                <button class="btn btn-outline-success btn-sm" title="Activar"
                    hx-post="{% url 'administrador:activar_producto' producto.id %}"
                    hx-target="#producto-{{ producto.id }}"
                    hx-swap="outerHTML">
                    <i class="bi bi-toggle-on"></i> Activar
                </button>
            {% endif %}

            <a class="btn btn-outline-success btn-sm" title="Ver ingredientes" 
               href="{% url 'administrador:ingredientes' producto.id %}" role="button">
                <i class="bi bi-basket"></i>
            </a>
        </div>
    </td>
</tr>
