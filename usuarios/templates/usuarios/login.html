<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Empleados - Brother's Burger</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;  /* Fondo oscuro como el menú lateral */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            padding: 1rem;
        }

        .login-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            padding: 2rem;
            max-width: 400px;
            width: 100%;
            border-top: 4px solid #f5a623;  /* Borde dorado arriba */
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 1.8rem;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }

        .login-header h2 {
            font-size: 1.3rem;
            color: #f5a623;  /* Dorado */
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: #666;
            font-size: 0.85rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: block;
            color: #333;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
            background: #f9f9f9;
        }

        .form-group input:focus {
            outline: none;
            border-color: #f5a623;
            box-shadow: 0 0 0 3px rgba(245,166,35,0.1);
            background: #ffffff;
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: #f5a623;  /* Dorado como acento */
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Poppins', sans-serif;
        }

        .btn-login:hover {
            background: #e69500;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245,166,35,0.3);
        }

        .forgot-password {
            text-align: center;
            margin-top: 1rem;
        }

        .forgot-password a {
            color: #f5a623;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .forgot-password a:hover {
            text-decoration: underline;
            color: #e69500;
        }

        .alert-empleado {
            background-color: #fef5e8;
            border-left: 4px solid #f5a623;
            padding: 1rem;
            margin-top: 1.5rem;
            border-radius: 8px;
            font-size: 0.8rem;
            color: #555;
            text-align: center;
        }

        .message-container {
            margin-bottom: 1.5rem;
        }

        .alert-info {
            background-color: #e8f4fd;
            color: #0c5460;
            padding: 0.75rem;
            border-radius: 8px;
            text-align: center;
            font-size: 0.85rem;
            border-left: 4px solid #17a2b8;
        }

        .alert-error {
            background-color: #fee;
            color: #c33;
            padding: 0.75rem;
            border-radius: 8px;
            text-align: center;
            font-size: 0.85rem;
            border-left: 4px solid #dc3545;
        }

        .alert-success {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 0.75rem;
            border-radius: 8px;
            text-align: center;
            font-size: 0.85rem;
            border-left: 4px solid #28a745;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h1>🍔 Burger System</h1>
            <h2>Portal de Empleados</h2>
            <p>Ingresa tus credenciales para acceder</p>
        </div>

        {% if messages %}
        <div class="message-container">
            {% for message in messages %}
            <div class="alert-{{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" name="username" placeholder="Ingresa tu usuario" required autofocus>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="Ingresa tu contraseña" required>
            </div>

            <button type="submit" class="btn-login">Iniciar Sesión</button>

            

            
        </form>
    </div>
</body>
</html>
